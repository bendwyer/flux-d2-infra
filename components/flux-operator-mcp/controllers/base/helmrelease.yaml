---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator-mcp
  namespace: flux-operator-mcp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: flux-operator-mcp
  values:
    transport: http
    readonly: false
    networkPolicy:
      ingress:
        namespaces:
          - tailscale
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: null
        memory: 128Mi
