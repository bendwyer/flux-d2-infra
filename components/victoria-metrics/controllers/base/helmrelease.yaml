---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: victoria-metrics
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-k8s-stack
  # install:
  #   remediation:
  #     retries: 3
  # upgrade:
  #   cleanupOnFail: true
  #   remediation:
  #     retries: 3
  values:
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "13"
        extraArgs:
          opentelemetry.usePrometheusNaming: "true"
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
    grafana:
      enabled: true
      service:
        type: ClusterIP
      ingress:
        enabled: false
      plugins:
        - victoriametrics-logs-datasource
      sidecar:
        datasources:
          enabled: true
        dashboards:
          enabled: true
    defaultDatasources:
      extra:
        - name: VictoriaLogs
          type: victoriametrics-logs-datasource
          access: proxy
          url: http://victoria-logs-single-server.victoria-logs.svc.cluster.local:9428
          isDefault: false
          editable: false
    alertmanager:
      enabled: true
      spec:
        replicaCount: 1
        selectAllByDefault: true
        secrets:
          - discord-webhook
      config:
        route:
          receiver: discord
          group_by:
            - alertname
            - namespace
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: "null"
              matchers:
                - alertname = "InfoInhibitor"
            - receiver: "null"
              matchers:
                - alertname = "Watchdog"
        receivers:
          - name: "null"
          - name: discord
            discord_configs:
              - webhook_url_file: /etc/vm/secrets/discord-webhook/credential
                title: |-
                  [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
                message: |-
                  {{ range .Alerts }}
                  **{{ .Status | toUpper }}**{{ if .Labels.severity }} `{{ .Labels.severity }}`{{ end }}{{ if .Labels.namespace }} *{{ .Labels.namespace }}*{{ end }} — {{ .StartsAt.Local.Format "Jan 02 15:04 MST" }}
                  {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ end }}
                  {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
                  {{ end }}
                  [View in Alertmanager](https://alertmanager.tail0c49c.ts.net)
    vmalert:
      spec:
        extraArgs:
          external.url: https://grafana.tail0c49c.ts.net
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeEtcd:
      enabled: false
    kube-state-metrics:
      enabled: true
    vmagent:
      spec:
        externalLabels:
          cluster: home
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 200m
            memory: 256Mi
    prometheus-node-exporter:
      enabled: true
