---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: victoria-metrics
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "^0.71.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: victoria-metrics
  # install:
  #   remediation:
  #     retries: 3
  # upgrade:
  #   cleanupOnFail: true
  #   remediation:
  #     retries: 3
  values:
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "13"
        extraArgs:
          opentelemetry.usePrometheusNaming: "true"
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
    grafana:
      enabled: true
      service:
        type: ClusterIP
      ingress:
        enabled: false
      plugins:
        - victoriametrics-logs-datasource
      sidecar:
        datasources:
          enabled: true
        dashboards:
          enabled: true
    defaultDatasources:
      extra:
        - name: VictoriaLogs
          type: victoriametrics-logs-datasource
          access: proxy
          url: http://victoria-logs-single-server.victoria-logs.svc.cluster.local:9428
          isDefault: false
          editable: false
    alertmanager:
      enabled: true
      spec:
        replicaCount: 1
        selectAllByDefault: true
    vmagent:
      spec:
        externalLabels:
          cluster: home
    kube-state-metrics:
      enabled: true
    prometheus-node-exporter:
      enabled: true
