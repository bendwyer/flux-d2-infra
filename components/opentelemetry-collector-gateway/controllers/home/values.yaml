---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector-gateway
  namespace: opentelemetry-collector-gateway
spec:
  interval: 1h
  values:
    config:
      receivers:
        prometheus:
          config:
            global:
              scrape_interval: 30s
            scrape_configs:
              - job_name: kube-state-metrics
                static_configs:
                  - targets:
                      - kube-state-metrics.kube-state-metrics.svc.cluster.local:8080
              - job_name: apiserver
                scheme: https
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                static_configs:
                  - targets:
                      - kubernetes.default.svc.cluster.local:443
              - job_name: prometheus
                static_configs:
                  - targets:
                      - prometheus-prometheus.prometheus.svc.cluster.local:9090
              - job_name: grafana
                static_configs:
                  - targets:
                      - grafana.grafana.svc.cluster.local:80
              - job_name: alertmanager
                static_configs:
                  - targets:
                      - alertmanager.alertmanager.svc.cluster.local:9093
              - job_name: loki
                static_configs:
                  - targets:
                      - loki.loki.svc.cluster.local:3100
              - job_name: kube-controller-manager
                scheme: https
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                kubernetes_sd_configs:
                  - role: node
                relabel_configs:
                  - source_labels: [__meta_kubernetes_node_labelpresent_node_role_kubernetes_io_control_plane]
                    regex: "true"
                    action: keep
                  - source_labels: [__address__]
                    regex: (.+):(.+)
                    target_label: __address__
                    replacement: $1:10257
              - job_name: kube-scheduler
                scheme: https
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                kubernetes_sd_configs:
                  - role: node
                relabel_configs:
                  - source_labels: [__meta_kubernetes_node_labelpresent_node_role_kubernetes_io_control_plane]
                    regex: "true"
                    action: keep
                  - source_labels: [__address__]
                    regex: (.+):(.+)
                    target_label: __address__
                    replacement: $1:10259
              - job_name: k8up
                static_configs:
                  - targets:
                      - k8up-metrics.k8up.svc.cluster.local:8080
              - job_name: pushgateway
                honor_labels: true
                static_configs:
                  - targets:
                      - prometheus-pushgateway.prometheus-pushgateway.svc.cluster.local:9091
              - job_name: flux-system
                kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                      names:
                        - flux-system
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_part_of]
                    regex: flux
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_container_port_name]
                    regex: http-prom
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: instance
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
              - job_name: flux-operator
                kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                      names:
                        - flux-system
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                    regex: flux-operator
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_container_port_name]
                    regex: http-metrics
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: instance
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
              - job_name: argo-workflows
                static_configs:
                  - targets:
                      - argo-workflows-workflow-controller.argo-workflows.svc.cluster.local:8080
      processors:
        # Override preset: drop `from: connection` — it misattributes OTLP-received metrics to the sender pod.
        k8sattributes:
          pod_association:
            - sources:
                - from: resource_attribute
                  name: k8s.pod.ip
            - sources:
                - from: resource_attribute
                  name: k8s.pod.uid
        transform:
          metric_statements:
            - context: scope
              statements:
                - set(name, "")
                - set(version, "")
      exporters:
        prometheusremotewrite:
          endpoint: http://prometheus-prometheus.prometheus.svc.cluster.local:9090/api/v1/write
          external_labels:
            cluster: home
          timeout: 30s
          remote_write_queue:
            enabled: true
            queue_size: 1000
            num_consumers: 5
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 5m
        otlp_http/loki:
          endpoint: http://loki-gateway.loki.svc.cluster.local:80/otlp
          tls:
            insecure: true
      service:
        pipelines:
          metrics:
            receivers:
              - prometheus
              - otlp
            processors:
              - memory_limiter
              - transform
              - batch
            exporters:
              - prometheusremotewrite
          logs:
            receivers:
              - otlp
            processors:
              - memory_limiter
              - batch
            exporters:
              - otlp_http/loki
        telemetry:
          metrics:
            level: detailed
          resource:
            service.namespace: gateway
            service.instance.id: ${env:OTEL_K8S_POD_NAME}
