---
# yaml-language-server: $schema=https://raw.githubusercontent.com/CustomResourceDefinition/catalog/refs/heads/main/schema/onepassword.com/onepassworditem_v1.json
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: snmp-mikrotik
  namespace: prometheus-snmp-exporter
spec:
  # The 1Password item must contain a field labeled `auth.yml` whose value is the
  # snmp_exporter SNMPv3 auth block (single-line flow YAML so 1Password preserves
  # it exactly):
  #
  # auths: {mikrotik_v3: {version: 3, security_level: authPriv, username: "USERNAME", password: "AUTH_PASSWORD", auth_protocol: SHA, priv_protocol: AES, priv_password: "PRIV_PASSWORD"}}
  #
  # The operator materializes a Secret `snmp-mikrotik` with key `auth.yml`,
  # mounted at /run/secrets/snmp-mikrotik/auth.yml.
  itemPath: "vaults/4kbytax7eoweefgrkbg2af6oxu/items/kcgzrpth2fpzpuvi3dqildn7ze"
