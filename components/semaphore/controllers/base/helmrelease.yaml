---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: semaphore
  namespace: semaphore
spec:
  interval: 1h
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: semaphore
  values:
    # External CloudNativePG (semaphore-db); chart-bundled databases off.
    postgresql:
      enabled: false
    mariadb:
      enabled: false
