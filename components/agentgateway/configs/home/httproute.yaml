---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp
  namespace: agentgateway
spec:
  parentRefs:
    - name: mcp-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: flux-operator-mcp
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: github-mcp
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: grafana-mcp
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: terraform-mcp
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: context7-mcp
