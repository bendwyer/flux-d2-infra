---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: github-mcp
  namespace: agentgateway
spec:
  mcp:
    targets:
      - name: github-mcp
        selector:
          services:
            matchLabels:
              app.kubernetes.io/service: mcp-servers-github-mcp
          namespaces:
            matchLabels:
              kubernetes.io/metadata.name: mcp-servers
