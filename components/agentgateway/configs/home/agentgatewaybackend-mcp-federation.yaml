---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mcp-federation
  namespace: agentgateway
spec:
  mcp:
    targets:
      - name: github
        static:
          host: github-mcp.agentgateway.svc.cluster.local
          port: 8082
          protocol: StreamableHTTP
          policies:
            auth:
              secretRef:
                name: github-mcp
      - name: grafana
        static:
          host: grafana-mcp.agentgateway.svc.cluster.local
          port: 8000
          protocol: StreamableHTTP
      - name: terraform
        static:
          host: terraform-mcp.agentgateway.svc.cluster.local
          port: 8080
          protocol: StreamableHTTP
      - name: context7
        static:
          host: context7-mcp.agentgateway.svc.cluster.local
          port: 3000
          protocol: StreamableHTTP
          policies:
            auth:
              secretRef:
                name: context7-mcp
      - name: flux-operator
        static:
          host: flux-operator-mcp.flux-operator-mcp.svc.cluster.local
          port: 9090
          protocol: StreamableHTTP
      - name: cloudflare-docs
        static:
          host: docs.mcp.cloudflare.com
          port: 443
          path: /mcp
          protocol: StreamableHTTP
          policies:
            tls:
              sni: docs.mcp.cloudflare.com
      - name: cloudflare-observability
        static:
          host: observability.mcp.cloudflare.com
          port: 443
          path: /mcp
          protocol: StreamableHTTP
          policies:
            tls:
              sni: observability.mcp.cloudflare.com
            auth:
              secretRef:
                name: cloudflare-observability-mcp
      - name: cloudflare-bindings
        static:
          host: bindings.mcp.cloudflare.com
          port: 443
          path: /mcp
          protocol: StreamableHTTP
          policies:
            tls:
              sni: bindings.mcp.cloudflare.com
            auth:
              secretRef:
                name: cloudflare-bindings-mcp
