---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: grafana-mcp
  namespace: agentgateway
spec:
  mcp:
    targets:
      - name: grafana-mcp
        selector:
          services:
            matchLabels:
              app.kubernetes.io/service: mcp-servers-grafana-mcp
          namespaces:
            matchLabels:
              kubernetes.io/metadata.name: mcp-servers
