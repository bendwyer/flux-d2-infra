---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector-node
  namespace: opentelemetry-collector-node
spec:
  interval: 1h
  values:
    clusterRole:
      create: true
      rules:
        - apiGroups: [""]
          resources: [pods, namespaces, nodes, nodes/proxy, nodes/metrics]
          verbs: [get, list, watch]
        - apiGroups: [apps]
          resources: [replicasets]
          verbs: [get, list, watch]
        - nonResourceURLs: [/metrics, /metrics/cadvisor]
          verbs: [get]
    config:
      receivers:
        prometheus:
          config:
            global:
              scrape_interval: 30s
            scrape_configs:
              - job_name: node-exporter
                static_configs:
                  - targets:
                      - ${env:OTEL_K8S_NODE_IP}:9100
              - job_name: kubelet
                scheme: https
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                static_configs:
                  - targets:
                      - ${env:OTEL_K8S_NODE_IP}:10250
              - job_name: cadvisor
                scheme: https
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                metrics_path: /metrics/cadvisor
                static_configs:
                  - targets:
                      - ${env:OTEL_K8S_NODE_IP}:10250
                relabel_configs:
                  - target_label: job
                    replacement: kubelet
              - job_name: kube-proxy
                static_configs:
                  - targets:
                      - ${env:OTEL_K8S_NODE_IP}:10249
              - job_name: longhorn
                kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                      names:
                        - longhorn
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_label_app]
                    regex: longhorn-manager
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_node_name]
                    regex: ${env:OTEL_K8S_NODE_NAME}
                    action: keep
                  - source_labels: [__meta_kubernetes_pod_ip]
                    target_label: __address__
                    replacement: $1:9500
      exporters:
        otlp_grpc:
          endpoint: opentelemetry-collector-gateway.opentelemetry-collector-gateway.svc.cluster.local:4317
          tls:
            insecure: true
      service:
        pipelines:
          logs:
            receivers:
              - filelog
            processors:
              - memory_limiter
              - batch
            exporters:
              - otlp_grpc
          metrics:
            receivers:
              - prometheus
            processors:
              - memory_limiter
              - batch
            exporters:
              - otlp_grpc
        telemetry:
          metrics:
            level: detailed
          resource:
            service.namespace: node
            service.instance.id: ${env:OTEL_K8S_POD_NAME}
