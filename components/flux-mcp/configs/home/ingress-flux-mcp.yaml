---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flux-mcp
  namespace: flux-mcp
  annotations:
    tailscale.com/proxy-group: private-ingress
    tailscale.com/tags: tag:k8s-private
    tailscale.com/http-redirect: "true"
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - flux-mcp
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flux-mcp-flux-operator-mcp
                port:
                  number: 9090
