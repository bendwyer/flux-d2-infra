---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: windmill-db
  namespace: windmill
spec:
  instances: 1
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 512Mi
  bootstrap:
    initdb:
      database: windmill
      owner: windmill
      # Windmill bootstraps its own RLS roles (windmill_admin WITH BYPASSRLS),
      # which requires superuser. Promote the owner role so the single app
      # connection secret (windmill-db-app/uri) is sufficient.
      postInitSQL:
        - ALTER ROLE windmill WITH SUPERUSER;
