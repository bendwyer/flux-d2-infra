---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: windmill
  namespace: windmill
spec:
  interval: 1h
  values:
    # Tailnet exposure is handled by a dedicated Tailscale Ingress (configs/home);
    # disable the chart's bundled Ingress.
    ingress:
      enabled: false
    windmill:
      baseProtocol: https
      baseDomain: windmill.tail0c49c.ts.net
      # CNPG-generated connection secret (Cluster windmill-db -> windmill-db-app).
      databaseUrlSecretName: windmill-db-app
      databaseUrlSecretKey: uri
      # Windmill's Infrastructure-as-Code operator: reconciles declared instance
      # settings into Postgres (drift-reverted). Manages base_url and the tsidp
      # OIDC SSO provider. The client secret is referenced from the 1Password
      # backed windmill-oidc Secret via envRef (the operator resolves it at sync
      # time); client_id is a non-secret public identifier so it is inlined.
      operator:
        enabled: true
        extraEnv:
          - name: TSIDP_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: windmill-oidc
                key: client_secret
        instanceSpec:
          global_settings:
            base_url: https://windmill.tail0c49c.ts.net
            # tsidp OIDC SSO. Windmill OSS has no generic OIDC connector and
            # custom-endpoint OAuth is EE-only in the UI, but supplying login_config
            # directly here (the "dev setup") is honored by the OSS backend.
            # Key "tsidp" sets the callback /user/login_callback/tsidp (matches the
            # registered redirect URI); display_name is the login button label.
            oauths:
              tsidp:
                id: e9777e80fb7a793b0d6831b922c2d9c4
                display_name: Tailscale
                secret:
                  envRef: TSIDP_CLIENT_SECRET
                login_config:
                  auth_url: https://idp.tail0c49c.ts.net/authorize
                  token_url: https://idp.tail0c49c.ts.net/token
                  userinfo_url: https://idp.tail0c49c.ts.net/userinfo
                  scopes:
                    - openid
                    - email
                    - profile
      appReplicas: 1
      # windmill-extra hosts the websocket gateway for the in-app editor LSP and
      # debugger (:3000); the Tailscale ingress splits /ws to it (configs/home).
      extraReplicas: 1
      windmillExtra:
        enableLsp: true
      # multiplayer + indexer are EE-only; keep them off on the OSS build.
      multiplayerReplicas: 0
      indexer:
        enabled: false
      # Full entry, not a minimal override: a partial workerGroups item drops the
      # chart defaults (privileged + root podSecurityContext + memory limit) that
      # Windmill workers need to execute jobs. Keep them; just trim to one group
      # at lower replicas and add a cpu/memory request so it is not BestEffort.
      workerGroups:
        - name: default
          controller: Deployment
          replicas: 2
          privileged: true
          # Engage PID-namespace job isolation; the chart does not set this env.
          extraEnv:
            - name: FAVOR_UNSHARE_PID
              value: "true"
          podSecurityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
