---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: windmill
  namespace: windmill
spec:
  interval: 1h
  # Cold windmill-extra image pull on chart bumps outruns Helm's default 5m wait.
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: windmill
  values:
    # External CloudNativePG (windmill-db); chart-bundled DB/MinIO and EE off.
    postgresql:
      enabled: false
    minio:
      enabled: false
    enterprise:
      enabled: false
