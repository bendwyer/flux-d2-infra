---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: windmill
  namespace: windmill
  annotations:
    tailscale.com/tags: tag:k8s-private
    tailscale.com/http-redirect: "true"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Windmill"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/icon: "windmill.png"
    gethomepage.dev/href: "https://windmill.tail0c49c.ts.net"
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - windmill
  rules:
    # The Tailscale operator builds one `tailscale serve` handler per path and
    # routes by longest prefix, so the websocket gateway (in-app editor LSP and
    # debugger on windmill-extra:3000) splits off from the app cleanly.
    # /ws_mp (multiplayer) is omitted: it is EE-only and disabled here.
    - http:
        paths:
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: windmill-extra
                port:
                  number: 3000
          - path: /ws_debug/
            pathType: Prefix
            backend:
              service:
                name: windmill-extra
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: windmill-app
                port:
                  number: 8000
