---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: k8up
  namespace: k8up
  labels:
    app.kubernetes.io/part-of: k8s-monitoring
spec:
  groups:
    - name: k8up.rules
      rules:
        - alert: K8upResticErrors
          expr: k8up_backup_restic_last_errors > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Restic backup errors in {{ $labels.instance }}"
            description: >-
              The last restic backup for {{ $labels.instance }} ({{ $labels.pvc }})
              encountered {{ $value }} error(s). This may indicate permission issues
              or files that could not be read during backup.
            runbook_url: https://k8up.io/k8up/explanations/runbooks/K8upResticErrors.html
        - alert: K8upBackupNotRunning
          expr: sum(rate(k8up_jobs_total[25h])) == 0 and on(namespace) k8up_schedules_gauge > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "No k8up backup jobs ran in {{ $labels.namespace }} in the last 24h"
            description: >-
              Namespace {{ $labels.namespace }} has active k8up schedules but no
              backup jobs have run in the last 24 hours. The k8up operator may be
              stuck or the schedule may be misconfigured.
            runbook_url: https://k8up.io/k8up/explanations/runbooks/K8upBackupNotRunning.html
