---
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: schedule-tsidp-data
  namespace: tsidp
spec:
  podSecurityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1000
  backup:
    schedule: "30 1 * * *"
    failedJobsHistoryLimit: 3
    successfulJobsHistoryLimit: 3
    labelSelectors:
      - matchLabels:
          k8up.io/backup-schedule: tsidp-data
  prune:
    schedule: "0 2 * * 6"
    retention:
      keepDaily: 7
      keepWeekly: 4
      keepMonthly: 3
  check:
    schedule: "30 2 * * 6"
  backend:
    repoPasswordSecretRef:
      name: k8up-backup-credentials
      key: RESTIC_PASSWORD
    s3:
      endpoint: https://nbg1.your-objectstorage.com
      bucket: k8up-home-9935857008/tsidp/tsidp-data
      accessKeyIDSecretRef:
        name: k8up-backup-credentials
        key: AWS_ACCESS_KEY_ID
      secretAccessKeySecretRef:
        name: k8up-backup-credentials
        key: AWS_SECRET_ACCESS_KEY
