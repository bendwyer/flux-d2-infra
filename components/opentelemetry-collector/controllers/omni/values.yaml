---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: opentelemetry-collector
spec:
  interval: 1h
  values:
    dnsPolicy: Default
    config:
      receivers:
        prometheus:
          config:
            scrape_configs:
              - job_name: kube-state-metrics
                scrape_interval: 30s
                static_configs:
                  - targets:
                      - kube-state-metrics.kube-state-metrics.svc.cluster.local:8080
              - job_name: node-exporter
                scrape_interval: 30s
                static_configs:
                  - targets:
                      - node-exporter-prometheus-node-exporter.node-exporter.svc.cluster.local:9100
      exporters:
        otlp/home:
          endpoint: "otel-collector.tail0c49c.ts.net:4317"
          tls:
            insecure: true
          compression: gzip
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
      service:
        pipelines:
          logs:
            receivers:
              - filelog
            processors:
              - memory_limiter
              - batch
            exporters:
              - otlp/home
          metrics:
            receivers:
              - prometheus
            processors:
              - memory_limiter
              - batch
            exporters:
              - otlp/home
