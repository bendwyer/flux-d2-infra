---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: opentelemetry-collector
spec:
  interval: 1h
  values:
    config:
      exporters:
        otlp/home:
          endpoint: "otel-collector-home.opentelemetry-collector.svc.cluster.local:4317"
          tls:
            insecure: true
          compression: gzip
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
      service:
        pipelines:
          logs:
            receivers:
              - filelog
            processors:
              - memory_limiter
              - batch
            exporters:
              - otlp/home
