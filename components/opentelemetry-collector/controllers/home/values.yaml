---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: opentelemetry-collector
spec:
  interval: 1h
  values:
    config:
      exporters:
        otlp:
          endpoint: opentelemetry-collector-gateway.opentelemetry-collector-gateway.svc.cluster.local:4317
          tls:
            insecure: true
      service:
        pipelines:
          logs:
            receivers:
              - filelog
            processors:
              - memory_limiter
              - batch
            exporters:
              - otlp
          # Disable chart-default pipelines that route to the debug exporter
          metrics: null
          traces: null
