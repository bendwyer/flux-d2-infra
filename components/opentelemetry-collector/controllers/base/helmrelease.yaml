---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: opentelemetry-collector
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: opentelemetry-collector
  # install:
  #   remediation:
  #     retries: 3
  # upgrade:
  #   cleanupOnFail: true
  #   remediation:
  #     retries: 3
  values:
    mode: daemonset
    image:
      repository: otel/opentelemetry-collector-contrib
    presets:
      logsCollection:
        enabled: true
        includeCollectorLogs: false
      kubernetesAttributes:
        enabled: true
        extractAllPodLabels: true
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    extraVolumes:
      - name: hostfs-proc
        hostPath:
          path: /proc
      - name: hostfs-sys
        hostPath:
          path: /sys
    extraVolumeMounts:
      - name: hostfs-proc
        mountPath: /hostfs/proc
        readOnly: true
      - name: hostfs-sys
        mountPath: /hostfs/sys
        readOnly: true
    config:
      receivers:
        hostmetrics:
          collection_interval: 30s
          root_path: /hostfs
          scrapers:
            cpu: {}
            memory: {}
            load: {}
            network: {}
            # filesystem and disk omitted — Talos uses squashfs root +
            # ephemeral overlays which produce noisy/misleading data.
            # Add later with exclude_mount_points/exclude_fs_types filters.
        filelog:
          include:
            - /var/log/pods/*/*/*.log
          exclude:
            - /var/log/pods/*/otc-container/*.log
          include_file_path: true
          include_file_name: false
          operators:
            - id: container-parser
              type: container
          retry_on_failure:
            enabled: true
          start_at: end
      processors:
        batch:
          send_batch_size: 10000
          timeout: 5s
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 25
