---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmagent
  namespace: vmagent
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-agent
  values:
    remoteWrite:
      - url: http://victoriametrics-home.vmagent.svc.cluster.local:8428/api/v1/write
    extraArgs:
      promscrape.suppressDuplicateScrapeTargetErrors: "true"
    config:
      global:
        scrape_interval: 30s
        external_labels:
          cluster: omni
      scrape_configs:
        - job_name: kubelet
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - target_label: job
              replacement: kubelet
            - source_labels: [__metrics_path__]
              target_label: metrics_path
          honor_labels: true
        - job_name: kube-state-metrics
          static_configs:
            - targets:
                - kube-state-metrics.kube-state-metrics.svc.cluster.local:8080
        - job_name: node-exporter
          static_configs:
            - targets:
                - node-exporter-prometheus-node-exporter.node-exporter.svc.cluster.local:9100
