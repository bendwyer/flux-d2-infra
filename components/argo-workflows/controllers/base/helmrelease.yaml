---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
  namespace: argo-workflows
spec:
  interval: 1h
  chart:
    spec:
      chart: argo-workflows
      version: "1.0.13"
      sourceRef:
        kind: HelmRepository
        name: argo-workflows
        namespace: argo-workflows
  values:
    crds:
      install: false
    workflow:
      serviceAccount:
        create: true
        name: argo-workflow
    controller:
      workflowDefaults:
        spec:
          ttlStrategy:
            secondsAfterCompletion: 86400
          podGC:
            strategy: OnWorkflowSuccess
      metricsConfig:
        enabled: true
        port: 9090
        path: /metrics
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 256Mi
    server:
      enabled: true
      serviceType: ClusterIP
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 128Mi
    executor:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 256Mi
