---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: prometheus
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: prometheus
  values:
    fullnameOverride: "prometheus"

    crds:
      enabled: true

    # --- Disable all bundled components — deployed as standalone ---
    grafana:
      enabled: false
    alertmanager:
      enabled: false
    nodeExporter:
      enabled: false
    kubeStateMetrics:
      enabled: false
    defaultRules:
      create: false

    # --- Disable all scrape targets — OTel Gateway handles collection ---
    kubelet:
      enabled: false
    kubeApiServer:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: false
    coreDns:
      enabled: false

    # --- Prometheus Operator ---
    prometheusOperator:
      enabled: true

    # --- Prometheus Instance ---
    prometheus:
      enabled: true
      prometheusSpec:
        retention: "30d"
        enableRemoteWriteReceiver: true

        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi

        # Watch PrometheusRule CRDs across all namespaces
        ruleSelectorNilUsesHelmValues: false
        ruleSelector: {}
        ruleNamespaceSelector: {}

        # Disable scraping — OTel handles collection
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector:
          matchLabels:
            __disabled__: "true"
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorSelector:
          matchLabels:
            __disabled__: "true"
        scrapeConfigSelectorNilUsesHelmValues: false
        scrapeConfigSelector:
          matchLabels:
            __disabled__: "true"
