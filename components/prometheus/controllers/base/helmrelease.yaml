---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: prometheus
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: prometheus
  values:
    server:
      retention: "30d"
      persistentVolume:
        enabled: true
        size: 50Gi
      extraFlags:
        - "web.enable-remote-write-receiver"
    # Disable bundled sub-charts — deployed as standalone components
    alertmanager:
      enabled: false
    kube-state-metrics:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    prometheus-pushgateway:
      enabled: false
