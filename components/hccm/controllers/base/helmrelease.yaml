---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hccm
  namespace: hccm
spec:
  interval: 1h
  releaseName: hccm
  targetNamespace: kube-system
  storageNamespace: kube-system
  chart:
    spec:
      chart: hcloud-cloud-controller-manager
      version: "1.30.1"
      sourceRef:
        kind: HelmRepository
        name: hccm
        namespace: hccm
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    env:
      HCLOUD_TOKEN:
        valueFrom:
          secretKeyRef:
            name: hcloud
            key: credential
