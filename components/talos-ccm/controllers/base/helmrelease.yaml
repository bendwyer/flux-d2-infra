---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: talos-cloud-controller-manager
  namespace: talos-ccm
spec:
  interval: 1h
  releaseName: talos-cloud-controller-manager
  targetNamespace: kube-system
  storageNamespace: kube-system
  chartRef:
    kind: OCIRepository
    name: talos-cloud-controller-manager
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    # One-time migration: 0.5.5 moved the metrics port 50258 to 10458, and a
    # server-side-apply merge keeps both entries (duplicate "metrics" port name,
    # invalid). force replaces the Service/Deployment so the stale port is dropped.
    # Remove once the release is on 0.5.5 and healthy.
    force: true
    remediation:
      retries: 3
