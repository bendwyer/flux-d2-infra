---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: node-exporter-mixin
  namespace: prometheus-node-exporter
spec:
  sourceRef:
    kind: OCIRepository
    name: node-exporter-mixin
  path: .
  targetNamespace: prometheus-node-exporter
  prune: true
  interval: 10m
  patches:
    - target:
        kind: ConfigMap
      patch: |
        - op: add
          path: /metadata/annotations/grafana_folder
          value: "Node Exporter"
