---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alertmanager
  namespace: alertmanager
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: alertmanager
  values:
    replicaCount: 1
    persistence:
      enabled: true
      size: 1Gi
