---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alertmanager
  namespace: alertmanager
spec:
  interval: 1h
  values:
    extraSecretMounts:
      - name: discord-webhook
        mountPath: /etc/alertmanager/secrets/discord-webhook
        secretName: discord-webhook
        readOnly: true
    config:
      route:
        receiver: discord
        group_by:
          - alertname
          - namespace
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - receiver: "null"
            matchers:
              - alertname = "InfoInhibitor"
          - receiver: "null"
            matchers:
              - alertname = "Watchdog"
      receivers:
        - name: "null"
        - name: discord
          discord_configs:
            - webhook_url_file: /etc/alertmanager/secrets/discord-webhook/credential
              title: |-
                [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
              message: |-
                {{ range .Alerts }}
                **{{ .Status | toUpper }}**{{ if .Labels.severity }} `{{ .Labels.severity }}`{{ end }}{{ if .Labels.namespace }} *{{ .Labels.namespace }}*{{ end }} — {{ .StartsAt.Local.Format "Jan 02 15:04 MST" }}
                {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ end }}
                {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
                {{ end }}
                [View in Alertmanager](https://alertmanager.tail0c49c.ts.net)
