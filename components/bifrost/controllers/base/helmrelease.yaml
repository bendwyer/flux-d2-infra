---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bifrost
  namespace: bifrost
spec:
  interval: 1h
  chart:
    spec:
      chart: bifrost
      version: "2.0.18"
      sourceRef:
        kind: HelmRepository
        name: bifrost
        namespace: bifrost
  values:
    image:
      tag: "v1.4.22"
    service:
      type: ClusterIP
      port: 8080
    bifrost:
      logLevel: info
      logStyle: json
      client:
        allowDirectKeys: true
        enableLogging: true
        disableContentLogging: false
      providers: {}
      plugins:
        telemetry:
          enabled: true
    storage:
      mode: postgres
      persistence:
        enabled: false
    postgresql:
      enabled: false
      external:
        enabled: true
        host: bifrost-db-rw.bifrost.svc.cluster.local
        port: 5432
        user: bifrost
        database: bifrost
        sslMode: require
        existingSecret: bifrost-db-app
        passwordKey: password
    vectorStore:
      enabled: false
      type: none
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 256Mi
