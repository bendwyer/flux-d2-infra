---
# yaml-language-server: $schema=https://raw.githubusercontent.com/CustomResourceDefinition/catalog/refs/heads/main/schema/app.terraform.io/agentpool_v1alpha2.json
apiVersion: app.terraform.io/v1alpha2
kind: AgentPool
metadata:
  name: home-pool
  namespace: hcp-terraform-operator
spec:
  organization: bendwyer
  token:
    secretKeyRef:
      name: hcp-terraform
      key: credential
  name: home-pool
  agentTokens:
    - name: home-agent
  agentDeployment:
    replicas: 1
    spec:
      securityContext:
        runAsNonRoot: true
        # tfc-agent image declares its user by name (USER tfc-agent), not a UID.
        # runAsNonRoot alone makes the kubelet refuse the container with
        # CreateContainerConfigError ("non-numeric user"). The tfc-agent user is UID 999.
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hcp-terraform-agent
          image: "hashicorp/tfc-agent:1.30"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 256Mi
